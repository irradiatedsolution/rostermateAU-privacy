<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RosterMateAU</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 20px; padding: 48px 40px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .icon { font-size: 64px; margin-bottom: 16px; }
  h1 { color: #1E3A5F; font-size: 28px; margin-bottom: 8px; }
  .subtitle { color: #666; font-size: 15px; margin-bottom: 4px; }
  .by { color: #00A3A3; font-size: 13px; margin-bottom: 32px; text-decoration: none; }
  .divider { border: none; border-top: 1px solid #eee; margin: 24px 0; }
  .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .links a { background: #1E3A5F; color: white; padding: 10px 24px; border-radius: 10px; text-decoration: none; font-size: 14px; font-weight: 600; transition: opacity 0.2s; }
  .links a:hover { opacity: 0.85; }
  .footer { margin-top: 24px; color: #aaa; font-size: 12px; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🗓️</div>
    <h1>RosterMateAU</h1>
    <p class="subtitle">Australian Roster & Payslip Manager</p>
    <a class="by" href="https://irradiatedsolution.github.io">by Irradiated Solution</a>
    <hr class="divider">
    <div class="links">
      <a href="privacy">🔒 Privacy Policy</a>
      <a href="terms">📄 Terms of Use</a>
    </div>
    <p class="footer">© 2026 Irradiated Solution · Victoria, Australia</p>
  </div>
</body>
</html>
